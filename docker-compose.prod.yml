version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nooremoon_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nooremoon_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nooremoon_rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nooremoon_api
    restart: always
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: nooremoon_web
    restart: always
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api

  strapi:
    build:
      context: ./apps/strapi
      dockerfile: Dockerfile
    container_name: nooremoon_strapi
    restart: always
    env_file: .env
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - strapi_data:/srv/app/public/uploads

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  strapi_data:
